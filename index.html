    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@500;600&display=swap');
        :root { --primary: #6366f1; }
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
        .icon-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        .icon-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.15);
            border-color: #6366f1;
        }
        .emoji { font-size: 2.5rem; line-height: 1; transition: transform 0.2s ease; }
        .icon-card:hover .emoji { transform: scale(1.15); }
        .heart-btn {
            position: absolute; top: 8px; right: 8px; width: 26px; height: 26px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 9999px; background: rgba(255,255,255,0.1);
            transition: all 0.2s ease; z-index: 10;
        }
        .heart-btn:hover { background: rgba(239, 68, 68, 0.2); transform: scale(1.1); }
        .heart-btn.favorited { color: #ef4444; }
        .export-btn { transition: all 0.1s ease; font-size: 9px; padding: 1px 6px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-zinc-950 text-zinc-200">

        // ==================== FAVORITES SYSTEM ====================
        let favorites = new Set();

        function loadFavorites() {
            const saved = localStorage.getItem('iconlyFavorites');
            if (saved) favorites = new Set(JSON.parse(saved));
        }

        function saveFavorites() {
            localStorage.setItem('iconlyFavorites', JSON.stringify([...favorites]));
        }

        function toggleFavorite(key) {
            if (favorites.has(key)) {
                favorites.delete(key);
            } else {
                favorites.add(key);
            }
            saveFavorites();
            renderEmojis();
            renderIcons();
        }

        function isFavorited(key) {
            return favorites.has(key);
        }

        function showFavorites() {
            const favEmojis = emojiData.filter(e => favorites.has(e.emoji));
            const favIcons = iconData.filter(i => favorites.has(i.class));
            if (favEmojis.length === 0 && favIcons.length === 0) {
                showToast("No favorites yet! Click any heart ❤️");
                return;
            }
            renderEmojis(favEmojis);
            renderIcons(favIcons);
            showToast(`${favEmojis.length + favIcons.length} favorites shown`);
        }

        // ==================== RENDER FUNCTIONS ====================
        function renderEmojis(filtered = null) {
            const container = document.getElementById('emojis-grid');
            container.innerHTML = '';
            const data = filtered || emojiData;
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = `icon-card bg-zinc-900 border border-zinc-800 hover:border-indigo-500/50 rounded-3xl p-4 flex flex-col items-center justify-center cursor-pointer group relative min-h-[168px]`;
                card.innerHTML = `
                    <div class="emoji mb-3">${item.emoji}</div>
                    <div class="text-xs text-zinc-400 text-center font-medium">${item.name}</div>
                `;
                const heart = document.createElement('div');
                heart.className = `heart-btn ${isFavorited(item.emoji) ? 'favorited' : ''}`;
                heart.innerHTML = `<i class="fa-solid fa-heart"></i>`;
                heart.onclick = (e) => {
                    e.stopImmediatePropagation();
                    toggleFavorite(item.emoji);
                };
                card.appendChild(heart);
                card.onclick = () => copyToClipboard(item.emoji, item.name);
                container.appendChild(card);
            });
        }

        function renderIcons(filtered = null) {
            const container = document.getElementById('icons-grid');
            container.innerHTML = '';
            const data = filtered || iconData;
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = `icon-card bg-zinc-900 border border-zinc-800 hover:border-indigo-500/50 rounded-3xl p-5 flex flex-col items-center justify-center cursor-pointer group relative min-h-[172px]`;
                card.innerHTML = `
                    <div class="mb-3"><i class="${item.class} text-4xl text-indigo-400"></i></div>
                    <div class="text-xs text-zinc-400 text-center font-medium">${item.name}</div>
                `;
                const heart = document.createElement('div');
                heart.className = `heart-btn ${isFavorited(item.class) ? 'favorited' : ''}`;
                heart.innerHTML = `<i class="fa-solid fa-heart"></i>`;
                heart.onclick = (e) => {
                    e.stopImmediatePropagation();
                    toggleFavorite(item.class);
                };
                card.appendChild(heart);
                card.onclick = () => copyToClipboard(item.class, item.name);
                container.appendChild(card);
            });
        }

        function copyToClipboard(text, label) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                document.getElementById('toast-text').innerHTML = `${label} copied!`;
                toast.style.display = 'flex';
                setTimeout(() => toast.style.display = 'none', 2000);
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerHTML = message;
            toast.style.display = 'flex';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        function showAuthModal() {
            showToast("🔥 Full Pro + auth coming soon!");
        }

        function bulkExportVisible() {
            showToast("Bulk export coming in Pro version!");
        }

        // ==================== INITIALIZE ====================
        function initializeWebsite() {
            loadFavorites();
            renderEmojis();
            renderIcons();
        }

        window.onload = initializeWebsite;
    </script>
