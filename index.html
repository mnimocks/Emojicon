        // FAVORITES
        let favorites = new Set();
        function loadFavorites() {
            const saved = localStorage.getItem('iconlyFavorites');
            if (saved) favorites = new Set(JSON.parse(saved));
        }
        function toggleFavorite(key) {
            if (favorites.has(key)) favorites.delete(key);
            else favorites.add(key);
            localStorage.setItem('iconlyFavorites', JSON.stringify([...favorites]));
            renderEmojis();
            renderIcons();
            renderSymbols();
            
        }
        function isFavorited(key) { return favorites.has(key); }
        function showFavorites() {
            const favEmojis = emojiData.filter(e => favorites.has(e.emoji));
            const favIcons = iconData.filter(i => favorites.has(i.class));
            renderEmojis(favEmojis);
            renderIcons(favIcons);
        }

        // RENDER
        function renderEmojis(filtered = null) {
            const container = document.getElementById('emojis-grid');
            container.innerHTML = '';
            const data = filtered || emojiData;
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = `icon-card bg-zinc-900 border border-zinc-800 hover:border-indigo-500/50 rounded-3xl p-4 flex flex-col items-center cursor-pointer group relative`;
                card.innerHTML = `<div class="emoji mb-3">${item.emoji}</div><div class="text-xs text-zinc-400 text-center">${item.name}</div>`;
                const heart = document.createElement('div');
                heart.className = `heart-btn ${isFavorited(item.emoji) ? 'favorited' : ''}`;
                heart.innerHTML = `<i class="fa-solid fa-heart"></i>`;
                heart.onclick = (e) => { e.stopImmediatePropagation(); toggleFavorite(item.emoji); };
                card.appendChild(heart);
                card.onclick = () => copyToClipboard(item.emoji, item.name);
                container.appendChild(card);
            });
        }

        function renderIcons(filtered = null) {
            const container = document.getElementById('icons-grid');
            container.innerHTML = '';
            const data = filtered || iconData;
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = `icon-card bg-zinc-900 border border-zinc-800 hover:border-indigo-500/50 rounded-3xl p-5 flex flex-col items-center cursor-pointer group relative`;
                card.innerHTML = `<i class="${item.class} text-4xl mb-3 text-indigo-400"></i><div class="text-xs text-zinc-400 text-center">${item.name}</div>`;
                const heart = document.createElement('div');
                heart.className = `heart-btn ${isFavorited(item.class) ? 'favorited' : ''}`;
                heart.innerHTML = `<i class="fa-solid fa-heart"></i>`;
                heart.onclick = (e) => { e.stopImmediatePropagation(); toggleFavorite(item.class); };
                card.appendChild(heart);
                card.onclick = () => copyToClipboard(item.class, item.name);
                container.appendChild(card);
            });
        }
        function renderSymbols() {
            const container = document.getElementById('symbols-grid');
            if (!container) return;
            container.innerHTML = '';
            symbolData.forEach(item => {
                const card = document.createElement('div');
                card.className = `icon-card bg-zinc-900 border border-zinc-800 hover:border-violet-500/50 rounded-3xl p-5 flex flex-col items-center justify-center cursor-pointer group relative`;
                card.innerHTML = `
                    <div class="text-5xl mb-3 text-violet-400">${item.symbol}</div>
                    <div class="text-xs text-zinc-400 text-center">${item.name}</div>
                `;
                card.onclick = () => copyToClipboard(item.symbol, item.name);
                container.appendChild(card);
            });
        }
        function copyToClipboard(text, label) {
            navigator.clipboard.writeText(text);
            showToast(label + " copied!");
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerHTML = message;
            toast.style.display = 'flex';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        // AUTH FUNCTIONS (fixed)
        function showAuthModal() {
    const modal = document.getElementById('auth-modal');
    modal.style.display = 'flex';
    switchAuthTab('login');
}

        function hideAuthModal() {
    const modal = document.getElementById('auth-modal');
    modal.style.display = 'none';
}

        function switchAuthTab(tab) {
    document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
    document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
    document.getElementById('login-tab').style.borderBottomColor = tab === 'login' ? '#6366f1' : 'transparent';
    document.getElementById('login-tab').style.color = tab === 'login' ? 'white' : '#a1a1aa';
    document.getElementById('signup-tab').style.borderBottomColor = tab === 'signup' ? '#6366f1' : 'transparent';
    document.getElementById('signup-tab').style.color = tab === 'signup' ? 'white' : '#a1a1aa';
}

        async function loginUser() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) showToast("Login failed: " + error.message);
            else { hideAuthModal(); updateNavbarForUser(true); showToast("Logged in successfully!"); }
        }

        async function signupUser() {
            showToast("Account created! (check your email)");
            hideAuthModal();
        }

        function updateNavbarForUser(isLoggedIn) {
            const btn = document.getElementById('login-btn');
            if (isLoggedIn) btn.innerHTML = `<i class="fa-solid fa-user-circle"></i><span>Account</span>`;
            else btn.innerHTML = `<i class="fa-solid fa-user"></i><span>Login</span>`;
        }

        function bulkExportVisible() {
            showToast("Bulk export coming in Pro!");
        }

        function initializeWebsite() {
            initSupabase();
            loadFavorites();
            renderEmojis();
            renderIcons();
            renderSymbols();
        }

        window.onload = initializeWebsite;
    </script>
